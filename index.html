<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>地下菌丝网络</title>
  </head>
  <body>
    <main class="game">
      <div id="srAnnounce" class="sr-only" aria-live="polite" aria-atomic="true"></div>
      <div id="srLog" class="sr-only" aria-live="polite" aria-atomic="false"></div>
      <section class="map-wrap">
        <header class="bar">
          <div>
            <p>Subsoil Network</p>
            <h1>地下菌丝网络</h1>
          </div>
          <div class="resource" aria-live="polite" aria-atomic="true">
            <span>养分</span>
            <strong id="nutrients">34</strong>
          </div>
        </header>

        <div id="map" class="map" aria-label="菌丝网络地图"></div>

        <div class="legend">
          <span><i class="loam"></i>壤土</span>
          <span><i class="wet"></i>湿土</span>
          <span><i class="dry"></i>干层</span>
          <span><i class="leaf"></i>落叶</span>
          <span><i class="tree"></i>树根</span>
          <span><i class="microbe"></i>微生物</span>
        </div>
      </section>

      <aside class="panel">
        <section>
          <label for="levelSelect" class="level-select-label">选择关卡</label>
          <select id="levelSelect" class="level-select"></select>
          <p id="levelGoal">连接所有树根，并保持养分不低于0。</p>
        </section>

        <section class="stats" aria-live="polite">
          <dl>
            <div><dt>回合</dt><dd id="turn">1</dd></div>
            <div><dt>连接树根</dt><dd id="trees">0/0</dd></div>
            <div><dt>分解落叶</dt><dd id="leaves">0</dd></div>
            <div><dt>菌丝长度</dt><dd id="length">1</dd></div>
          </dl>
        </section>

        <section class="tile-info" id="tileInfo">
          <h2>格子信息</h2>
          <p class="tile-hint">悬停或点击格子查看详情</p>
          <dl id="tileDetails" hidden>
            <div><dt>坐标</dt><dd id="tileCoord">-</dd></div>
            <div><dt>土壤类型</dt><dd id="tileSoil">-</dd></div>
            <div><dt>扩张消耗</dt><dd id="tileCost">-</dd></div>
            <div><dt>树根</dt><dd id="tileTree">-</dd></div>
            <div><dt>落叶</dt><dd id="tileLeaf">-</dd></div>
            <div><dt>微生物</dt><dd id="tileMicrobe">-</dd></div>
            <div><dt>可扩张</dt><dd id="tileCanGrow">-</dd></div>
          </dl>
        </section>

        <section class="grow-preview" id="growPreview" hidden>
          <h2>扩张预览</h2>
          <dl id="previewDetails">
            <div class="preview-delta"><dt>养分变化</dt><dd id="previewDelta">-</dd></div>
            <div class="preview-after"><dt>扩张后养分</dt><dd id="previewAfter">-</dd></div>
          </dl>
          <ul id="previewEffects" class="preview-effects"></ul>
          <ul id="previewWarnings" class="preview-warnings"></ul>
        </section>

        <section class="actions">
          <button id="nextTurn">回合推进</button>
          <button id="undo">撤销</button>
          <button id="reset">重置</button>
          <button id="toggleGuide">关卡图鉴</button>
          <button id="toggleEditor" style="grid-column: 1 / -1; color: white; border-color: #5d4e37; background: #5d4e37;">关卡编辑器</button>
        </section>

        <section class="guide" id="guide" hidden>
          <h2>关卡图鉴</h2>
          <div id="guideList" class="guide-list"></div>
        </section>

        <section class="editor" id="editor" hidden>
          <h2>关卡编辑器</h2>
          <div class="editor-field">
            <label for="editorName">关卡名称</label>
            <input type="text" id="editorName" placeholder="自定义关卡" maxlength="30" />
          </div>
          <div class="editor-field">
            <label for="editorGoal">目标描述</label>
            <input type="text" id="editorGoal" placeholder="例如：连接所有树根，分解落叶" maxlength="60" />
          </div>
          <div class="editor-grid">
            <div class="editor-field">
              <label for="editorNutrients">初始养分</label>
              <input type="number" id="editorNutrients" value="30" min="1" max="200" />
            </div>
            <div class="editor-field">
              <label for="editorStartX">起点 X (0-9)</label>
              <input type="number" id="editorStartX" value="0" min="0" max="9" />
            </div>
            <div class="editor-field">
              <label for="editorStartY">起点 Y (0-9)</label>
              <input type="number" id="editorStartY" value="0" min="0" max="9" />
            </div>
            <div class="editor-field">
              <label for="editorTrees">目标树根</label>
              <input type="number" id="editorTrees" value="0" min="0" max="20" />
            </div>
            <div class="editor-field">
              <label for="editorLeaves">目标落叶</label>
              <input type="number" id="editorLeaves" value="0" min="0" max="20" />
            </div>
          </div>
          <div class="editor-field">
            <label>字符地图（10×10，每行10字符）</label>
            <div class="editor-legend">
              <span><code>l</code>壤土</span>
              <span><code>w</code>湿土</span>
              <span><code>d</code>干层</span>
              <span><code>t</code>树根</span>
              <span><code>f</code>落叶</span>
              <span><code>m</code>微生物</span>
              <span><code>b</code>障碍</span>
              <span><code>s</code>起点(可选)</span>
            </div>
            <textarea id="editorMap" rows="10" spellcheck="false" placeholder="每行10个字符，共10行"></textarea>
          </div>
          <div class="editor-actions">
            <button id="editorValidate" class="editor-btn-primary">校验关卡</button>
            <button id="editorFillExample">填充示例</button>
            <button id="editorClear">清空地图</button>
          </div>
          <div class="editor-validation" id="editorValidation" hidden></div>
          <div class="editor-preview" id="editorPreview" hidden>
            <h3>预览</h3>
            <div id="editorPreviewMap" class="editor-preview-map" aria-label="关卡预览地图"></div>
            <dl class="editor-preview-stats" id="editorPreviewStats"></dl>
          </div>
          <div class="editor-actions">
            <button id="editorApply" class="editor-btn-success" disabled>应用并游玩</button>
            <button id="editorExport">导出 JSON</button>
            <button id="editorImportBtn">导入 JSON</button>
            <input type="file" id="editorImport" accept=".json,application/json" hidden />
          </div>
        </section>

        <section class="log" aria-label="土壤记录">
          <h2>土壤记录</h2>
          <ol id="log" aria-live="polite" aria-relevant="additions"></ol>
        </section>
      </aside>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
